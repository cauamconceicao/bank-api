spring.application.name=bankapi

# ============================================
# DATABASE - Neon PostgreSQL
# ============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-restless-hat-apl3fei0.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
